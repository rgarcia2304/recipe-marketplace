name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs: 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test Orders service
        working-directory: ./orders
        run: go build ./...

      - name: Test Gateway
        working-directory: ./gateway
        run: go build ./...

      - name: Test Fulfillment
        working-directory: ./fulfillment
        run: go build ./...

  build: 
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Chekout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Orders image
        uses: docker/build-push-action@v5
        with:
          context: 
          file: ./orders/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/recipe-marketplace-orders:latest


