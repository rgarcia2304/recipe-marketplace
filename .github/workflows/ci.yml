name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs: 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test Orders service
        working-directory: ./orders
        run: go build ./...

      - name: Test Gateway
        working-directory: ./gateway
        run: go build ./...

      - name: Test Fulfillment
        working-directory: ./fulfillment
        run: go build ./...




