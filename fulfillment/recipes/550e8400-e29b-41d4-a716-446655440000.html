<!DOCTYPE html>
<html>
<head><title>Grandma's Pasta Recipe</title></head>
<body>
    <h1>Grandma's Pasta</h1>
    <h2>Ingredients</h2>
    <ul>
        <li>500g pasta</li>
        <li>2 cloves garlic</li>
        <li>Olive oil</li>
        <li>Salt and pepper</li>
    </ul>
    <h2>Instructions</h2>
    <ol>
        <li>Boil pasta until al dente</li>
        <li>Saute garlic in olive oil</li>
        <li>Combine and season</li>
    </ol>
</body>
</html>
